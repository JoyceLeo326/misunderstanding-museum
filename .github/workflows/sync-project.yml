name: Sync project files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and clean project files
        shell: bash
        run: |
          base64 -d sync/project.tar.gz.b64 > /tmp/project.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name sync ! -name .github -exec rm -rf {} +
          tar -xzf /tmp/project.tar.gz -C .
          find . -name '._*' -delete
          rm -rf sync .github

      - name: Commit synchronized project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Finalize Misunderstanding Museum project"
          git push origin HEAD:main
